# Google Cloud Build — build container and deploy to Cloud Run
#
# Usage (local):
#   gcloud builds submit --config deploy/cloudbuild.yaml
#
# Usage (with specific tag):
#   gcloud builds submit --config deploy/cloudbuild.yaml "--substitutions=_TAG=abc1234"
#
# Required IAM roles on Cloud Build service account:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser

substitutions:
  _REGION: asia-east1
  _SERVICE_NAME: ai-ecommerce-media-studio
  _TAG: latest  # Overridden by CI trigger with SHORT_SHA

steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:latest
      - .

  # Step 2: Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --timeout=300s
      - --max-instances=3
      - --set-env-vars=STORAGE_TYPE=gcs,GCS_BUCKET_NAME=ai-ecommerce-media-studio-assets,GCS_PROJECT_ID=${PROJECT_ID},AUTH_ENABLED=true,RATE_LIMIT_ENABLED=true,API_KEYS=ai-media-studio-key-2026
      - --set-secrets=REPLICATE_API_TOKEN=replicate-token:latest,CELERY_BROKER_URL=celery-broker-url:latest,CELERY_RESULT_BACKEND=celery-broker-url:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
