# Cloud Run Service declarative config (IaC)
#
# Apply with:
#   gcloud run services replace deploy/cloudrun-service.yaml --region=asia-east1
#
# This is a declarative specification of the Cloud Run service.
# It can be version-controlled and applied idempotently.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-ecommerce-media-studio
  labels:
    app: ai-ecommerce-media-studio
    managed-by: cloud-run
  annotations:
    run.googleapis.com/description: "AI-powered e-commerce media generation platform for images and videos"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Auto-scaling settings
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # CPU is only allocated during request processing (cost optimization)
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: ""  # Uses default compute service account
      containers:
        - image: asia-east1-docker.pkg.dev/ai-ecommerce-media-studio/cloud-run-source-deploy/ai-ecommerce-media-studio:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          env:
            - name: REPLICATE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: replicate-token
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: celery-broker-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: celery-broker-url
            - name: STORAGE_TYPE
              value: "gcs"
            - name: GCS_BUCKET_NAME
              value: "ai-ecommerce-media-studio-assets"
            - name: GCS_PROJECT_ID
              value: "ai-ecommerce-media-studio"
            - name: AUTH_ENABLED
              value: "true"
            - name: RATE_LIMIT_ENABLED
              value: "true"
            - name: API_KEYS
              value: "ecommerce-demo-key-2026"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
